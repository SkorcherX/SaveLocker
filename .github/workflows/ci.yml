name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Server + Shared only. The Agent project is net9.0-windows and does not build on Linux.
  build-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Build server
        run: dotnet build src/Server/LocalGameSync.Server.csproj -c Release --no-incremental

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web

  build-agent-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent-ui/package-lock.json
      - run: npm ci
        working-directory: agent-ui
      - run: npm run build
        working-directory: agent-ui
