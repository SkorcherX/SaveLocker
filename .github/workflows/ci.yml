name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Server + Shared only. The Agent project is net10.0-windows and does not build on Linux.
  build-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build server
        run: dotnet build src/Server/SaveLocker.Server.csproj -c Release --no-incremental

  # The Steam Deck release artifact. This exists so packaging cannot rot unnoticed: it is only
  # exercised on a `v*` tag otherwise, i.e. exactly when it is too late to find out it is broken.
  # It does not just produce a .tar.gz — it INSTALLS the tarball into a throwaway HOME and runs the
  # binary, because "the archive was created" says nothing about whether a Deck user can use it.
  package-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent-ui/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build the self-contained tarball
        run: bash packaging/linux/build-linux.sh 9.9.9-ci

      # Install as a user would, into a clean HOME. systemd is not available on the runner, and
      # install.sh is expected to notice that and carry on rather than fail.
      - name: Install it the way a Deck user would
        run: |
          fake_home="$(mktemp -d)"
          tar -xzf artifacts/linux/savelocker-9.9.9-ci-linux-x64.tar.gz -C "$fake_home"
          HOME="$fake_home" bash "$fake_home/SaveLocker/install.sh"
          test -x "$fake_home/.local/share/SaveLocker/savelocker" || { echo "binary not installed"; exit 1; }
          test -L "$fake_home/.local/bin/savelocker"              || { echo "symlink not created"; exit 1; }

          # The installed binary must actually RUN — self-contained, on a box with no .NET runtime
          # of its own for it to fall back on. And it must report the version it was stamped with:
          # the agent sends that to the console in every heartbeat, so a wrong one is a lie in the
          # dashboard. It used to report the hard-coded default here, because an ELF apphost has no
          # Win32 version resource for FileVersionInfo to read.
          out="$(HOME="$fake_home" "$fake_home/.local/bin/savelocker" doctor --config "$fake_home/cfg.json" || true)"
          echo "$out" | head -5
          echo "$out" | grep -q "version: 9.9.9" || { echo "agent did not report its stamped version"; exit 1; }

          HOME="$fake_home" "$fake_home/.local/bin/savelocker" daemon \
            --config "$fake_home/cfg.json" > "$fake_home/daemon.log" 2>&1 &
          daemon_pid=$!
          trap 'kill "$daemon_pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            curl -sf http://localhost:5178/ >/dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:5178/ >/dev/null \
            || { echo "packaged agent UI was not served"; cat "$fake_home/daemon.log"; exit 1; }
          curl -sf http://localhost:5178/openapi/v1.json >/dev/null \
            || { echo "agent OpenAPI document was not served"; cat "$fake_home/daemon.log"; exit 1; }

          # The management API must refuse an unauthenticated caller. If this ever returns 200 the
          # local API is wide open again — which is how it shipped before, so assert it every build.
          code="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5178/api/state)"
          test "$code" = "401" || { echo "agent API answered an unauthenticated caller: HTTP $code"; exit 1; }

          # The token lives beside the config file the daemon was started with, not in the default dir.
          token="$(cat "$fake_home/api-token")"
          curl -sf -H "X-SaveLocker-Token: $token" http://localhost:5178/api/state >/dev/null \
            || { echo "agent API refused the local token"; cat "$fake_home/daemon.log"; exit 1; }
          npm --prefix agent-ui run gen:api -- --check
          kill "$daemon_pid"
          wait "$daemon_pid" || true
          trap - EXIT

      - name: Serve the agent UI from the package
        run: |
          # The daemon serves the React agent UI — a Deck's only UI. If agent-ui/dist is missing from
          # the tarball the daemon starts and silently serves nothing.
          test -f artifacts/linux/SaveLocker/agent-ui/index.html \
            || { echo "agent-ui was not packaged — the daemon would serve a blank page"; exit 1; }

      # THE check that protects Steam Decks, and the one nobody can run locally.
      #
      # A self-contained .NET app does NOT bind to the build host's glibc: libcoreclr.so and friends
      # are prebuilt by Microsoft against an old baseline and copied in, and our C# becomes IL. The
      # measured floor today is GLIBC_2.27 (2018), while SteamOS 3 ships >= 2.33 — a wide margin,
      # which is WHY building on Ubuntu 24.04 (glibc 2.39) is safe despite the host being newer.
      #
      # But that floor is a property of the toolchain, not a law. Turning on NativeAOT, or pulling in
      # a natively-compiled dependency, would raise it silently — and the failure lands as
      # "GLIBC_2.3x not found" on a USER'S DECK, which is un-reproducible on any machine we own. So
      # assert it instead of trusting it.
      - name: Assert the glibc floor still clears SteamOS
        run: |
          max_required="$(find artifacts/linux/SaveLocker -type f \( -name '*.so' -o -name 'savelocker' \) -print0 \
            | xargs -0 -I{} sh -c "objdump -T '{}' 2>/dev/null | grep -o 'GLIBC_[0-9]\+\.[0-9]\+'" \
            | sort -u -V | tail -1)"
          echo "highest glibc symbol required by the package: ${max_required:-none}"

          # 2.31 (Ubuntu 20.04) is comfortably below SteamOS's >= 2.33 and leaves headroom.
          limit="GLIBC_2.31"
          highest="$(printf '%s\n%s\n' "$max_required" "$limit" | sort -V | tail -1)"
          if [ "$highest" != "$limit" ]; then
            echo "::error::The Linux package now requires ${max_required}, above the ${limit} floor."
            echo "SteamOS 3 ships glibc ~2.33. A binary needing more than that fails on a user's Deck"
            echo "with 'GLIBC_x.y not found' — and it CANNOT be reproduced on a newer dev box."
            echo "Did something enable NativeAOT or add a native dependency?"
            exit 1
          fi

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web

  build-agent-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent-ui/package-lock.json
      - run: npm ci
        working-directory: agent-ui
      - run: npm run build
        working-directory: agent-ui

  # Build the server image on PRs. docker-publish.yml only runs on push-to-main, so without this
  # a broken Dockerfile is invisible until AFTER a merge, as a failed publish. This builds and
  # throws the image away — it publishes nothing.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the server image
        run: docker build -f src/Server/Dockerfile -t savelocker:ci .

  # The agent integration suite, driven against the LINUX agent. Same script that runs on
  # Windows (PowerShell Core runs on both) — so the shared Agent.Core sync brain is held to
  # one behavioural contract, not two.
  agent-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The agent UI must be built BEFORE the agent, whose build copies agent-ui/dist next to the
      # binary. Without it the daemon serves no UI — and the local-API suite asserts the auth token
      # is injected into index.html, which is the ONLY way the bundled UI ever receives a token. A
      # missing dist fails that check, correctly: an agent that cannot hand its UI a token is broken.
      # (This gap was invisible locally, where dist already existed from a previous build.)
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent-ui/package-lock.json
      - name: Build the agent UI
        run: npm ci && npm run build
        working-directory: agent-ui

      - name: Build server + Linux agent
        run: |
          dotnet build src/Server/SaveLocker.Server.csproj --no-incremental
          dotnet build src/Agent.Linux/SaveLocker.Agent.Linux.csproj --no-incremental

      - name: Start server (fresh DB)
        run: |
          mkdir -p "$RUNNER_TEMP/state/archives"
          ASPNETCORE_URLS=http://localhost:5179 \
          Storage__DbPath="$RUNNER_TEMP/state/savelocker.db" \
          Storage__ArchiveRoot="$RUNNER_TEMP/state/archives" \
            dotnet src/Server/bin/Debug/net10.0/SaveLocker.Server.dll > "$RUNNER_TEMP/server.log" 2>&1 &
          for _ in $(seq 1 60); do
            curl -sf http://localhost:5179/api/admin/status >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "Server did not start"; cat "$RUNNER_TEMP/server.log"; exit 1

      - name: Agent integration tests
        run: pwsh tests/run-agent-tests.ps1

      # Enrollment runs AFTER the agent suite: that suite expects a fresh DB, and this one adds a
      # game and a machine to it. `enroll` lives in Agent.Core, so driving it from the Linux host
      # exercises the same code the Windows agent runs.
      #
      # TOFU pinning is NOT covered here — plain http has no server identity to pin. That path is
      # tests/run-enrollment-tls-tests.ps1, which needs a trusted dev certificate and so is a local
      # check, not a CI one.
      - name: Enrollment integration tests
        run: pwsh tests/run-enrollment-tests.ps1

      # Health reporting lives in Agent.Core, so driving it from the Linux host exercises the same
      # code the Windows tray runs. It goes LAST: it stops and restarts the server to prove that a
      # failure occurring while the server is unreachable still reaches the console afterwards.
      - name: Agent health reporting tests
        run: pwsh tests/run-health-tests.ps1

      # Security tests. Each one must prove the ATTACK fails, not that ordinary saves still sync:
      # a symlink in a save folder must not leak its target into the archive, and — the data-loss
      # case — the restore's delete pass must not reach THROUGH a link and delete files outside the
      # save folder. Linux is where this matters most: a Wine prefix is full of symlinks.
      - name: Hardening tests (symlink escape, zip-slip)
        run: pwsh tests/run-hardening-tests.ps1

      # The agent's own management API. It rewrites config and re-registers this machine, so an
      # unauthenticated caller owns the box — and it used to answer every one of them, CORS wide
      # open, handing back the machine's server key. Proves each attack is refused.
      - name: Local agent API security tests
        run: pwsh tests/run-local-api-tests.ps1

      # The agent is not one process: autorun keeps the daemon alive while Steam starts the launch
      # wrapper, and they share config.json, the offline queue and the health events. Their locks
      # used to be in-process only. The sharp check here is the lost update — a daemon writing its
      # stale in-memory config erases the parent version a second process just recorded, and the
      # NEXT push is then rejected as a conflict. One machine, conflicting with itself.
      - name: Cross-process state tests (daemon vs. second process)
        run: pwsh tests/run-concurrency-tests.ps1

  # ── Cross-OS round-trip ──────────────────────────────────────────────────────────────────
  # Prove a Windows save and a Proton save are actually interchangeable.
  #
  # Runners cannot share a network, so the SERVER'S STATE (SQLite DB + archive store) is handed
  # between jobs as an artifact and the same server binary is restarted on top of it on the other
  # OS. One server, two agents, in the only form GitHub Actions permits.
  #
  #   crossos-author (win) --push--> [state] --pull--> crossos-roundtrip (linux) --push-->
  #                                  [state] --pull--> crossos-confirm (win)

  crossos-author:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # SaveLocker.Agent.csproj has a BeforeTargets="Build" step that runs `npm run build` in
      # agent-ui/ (the tray hosts that React app), so building the Windows agent needs Node and
      # the UI's dependencies installed — even though these tests only drive the CLI.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent-ui/package-lock.json
      - run: npm ci
        working-directory: agent-ui
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build server + Windows agent
        run: |
          dotnet build src/Server/SaveLocker.Server.csproj --no-incremental
          dotnet build src/Agent/SaveLocker.Agent.csproj --no-incremental
      # Windows PowerShell 5.1 on purpose, not pwsh: it is what a maintainer runs the suite under
      # locally, so CI exercises the same host the scripts are actually developed against.
      - name: Author the save and push it
        shell: powershell
        run: .\tests\cross-os\crossos.ps1 -Leg author
      - uses: actions/upload-artifact@v4
        with:
          name: crossos-after-windows
          path: |
            crossos-work/state
            crossos-work/expected
            crossos-work/head-hash.txt
          retention-days: 1

  crossos-roundtrip:
    runs-on: ubuntu-latest
    needs: crossos-author
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/download-artifact@v4
        with:
          name: crossos-after-windows
          path: crossos-work
      - name: Build server + Linux agent
        run: |
          dotnet build src/Server/SaveLocker.Server.csproj --no-incremental
          dotnet build src/Agent.Linux/SaveLocker.Agent.Linux.csproj --no-incremental
      - name: Pull the Windows save, byte-compare, assert the hash, push back
        shell: pwsh
        run: ./tests/cross-os/crossos.ps1 -Leg roundtrip
      - uses: actions/upload-artifact@v4
        with:
          name: crossos-after-linux
          path: |
            crossos-work/state
            crossos-work/expected
            crossos-work/head-hash.txt
          retention-days: 1

  crossos-confirm:
    runs-on: windows-latest
    needs: crossos-roundtrip
    steps:
      - uses: actions/checkout@v4
      # Building the Windows agent runs `npm run build` in agent-ui/ — see crossos-author.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent-ui/package-lock.json
      - run: npm ci
        working-directory: agent-ui
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/download-artifact@v4
        with:
          name: crossos-after-linux
          path: crossos-work
      - name: Build server + Windows agent
        run: |
          dotnet build src/Server/SaveLocker.Server.csproj --no-incremental
          dotnet build src/Agent/SaveLocker.Agent.csproj --no-incremental
      - name: Pull the Linux save and byte-compare
        shell: powershell
        run: .\tests\cross-os\crossos.ps1 -Leg confirm
