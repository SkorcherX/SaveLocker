name: Build and release agent installer

on:
  push:
    tags: ['v*']

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history to walk back to the nearest tag
          fetch-tags: true # explicitly fetch all tags — checkout doesn't guarantee this on tag-triggered runs

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent-ui/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          .\installer\build-installer.ps1 -AppVersion $version

      # The release body is the SAME file the console bundles and renders under What's New
      # (web/src/releases/<ver>.md), so notes are written once and cannot drift between the two.
      # Falls back to GitHub's generated commit list if the file is missing, rather than releasing
      # with no notes at all.
      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          path="web/src/releases/${GITHUB_REF_NAME#v}.md"
          if [ -f "$path" ]; then
            echo "path=$path" >> "$GITHUB_OUTPUT"
            echo "generate=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No hand-written notes at $path — falling back to generated notes."
            echo "generate=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: installer/dist/SaveLocker-Agent-Setup-*.exe
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: ${{ steps.notes.outputs.generate }}

  # ── Linux agent (Steam Deck / SteamOS) ────────────────────────────────────────────────────
  # Without this job there is no way for a Deck user to install the agent at all: SteamOS ships no
  # .NET runtime and its rootfs is immutable, so "clone the repo and build it" is not an option.
  #
  # This MUST run on ubuntu-latest, and not only for convenience. A self-contained .NET binary binds
  # to the HOST's glibc at build time, and an older-glibc build runs on newer systems but never the
  # reverse. Ubuntu 24.04 (glibc 2.39) is older than SteamOS's rolling Arch, so Ubuntu -> Deck is
  # forward-compatible. Building this on a newer host would produce "GLIBC_2.4x not found" on the
  # user's Deck — an error that cannot be reproduced on the machine that built it.
  # (Decisions.md §6.)
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: agent-ui/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The version is passed explicitly: MinVer stamps 0.0.0.0 when it cannot reach the git history
      # on a runner, and the agent reports its version to the console in every heartbeat — an
      # unstamped build shows up in the dashboard as a lie.
      - name: Build self-contained tarball
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash packaging/linux/build-linux.sh "$version"

      # No generate_release_notes here: this job only ATTACHES an asset to the release the
      # installer job created, and asking for generated notes a second time would overwrite the
      # hand-written body that job already set.
      - name: Attach tarball to the release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/linux/savelocker-*-linux-x64.tar.gz
