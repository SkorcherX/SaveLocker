<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- The agent replaces this placeholder with the live local API token when it serves the page.
         In `vite dev` it stays a placeholder; the dev proxy adds the header instead. -->
    <meta name="savelocker-token" content="__SAVELOCKER_TOKEN__" />
    <title>SaveLocker Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { background: #0d1114; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #3a4048; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #555e66; }
      input[type="checkbox"] { accent-color: #129271; width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
      button:disabled { cursor: default; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
