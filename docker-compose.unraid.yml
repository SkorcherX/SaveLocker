services:
  savelocker:
    image: ghcr.io/skorcherx/savelocker:latest
    container_name: savelocker-server
    ports:
      - "5080:8080"
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /mnt/user/appdata/savelocker:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

